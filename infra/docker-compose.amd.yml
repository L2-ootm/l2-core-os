# AMD GPU Windows Override - Uses CPU mode since ROCm requires Linux
# On Windows, Ollama will run in CPU mode but can still process requests
services:
  ollama:
    image: ollama/ollama:latest
    container_name: l2-ollama-amd
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - l2core_ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: l2-ollama-pull-amd
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - l2core_ollama:/root/.ollama
    command: /bin/sh -c "echo 'Baixando modelo Llama 3.2 (3B - CPU Mode)...' && ollama pull llama3.2:3b && echo 'Modelo pronto!'"
    restart: "no"
