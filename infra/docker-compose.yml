name: l2-core-os

services:
  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../apps/web:/app
    command: sh -lc "npm install && npm run dev"
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../apps/api:/app
    command: sh -lc "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - db
      - redis

  worker:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../apps/api:/app
    command: sh -lc "pip install -r requirements.txt && celery -A worker.celery_app worker --loglevel=INFO"
    env_file:
      - .env
    depends_on:
      - api
      - redis

  beat:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../apps/api:/app
    command: sh -lc "pip install -r requirements.txt && celery -A worker.celery_app beat --loglevel=INFO"
    env_file:
      - .env
    depends_on:
      - worker

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-l2core}
      POSTGRES_USER: ${POSTGRES_USER:-l2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-l2core_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - l2core_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --save 20 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"

  baileys-gateway:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../apps/baileys-gateway:/app
      - l2core_baileys_auth:/app/.auth
    command: sh -lc "apk add --no-cache git >/dev/null && npm install && npm run dev"
    env_file:
      - .env
    ports:
      - "${BAILEYS_PORT:-8090}:8090"
    depends_on:
      - api

  ollama:
    image: ollama/ollama:latest
    container_name: l2-ollama
    ports:
      - "11434:11434"
    volumes:
      - l2core_ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: l2-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - l2core_ollama:/root/.ollama
    command: /bin/sh -c "echo 'Baixando modelo Llama 3.2 (3B)...' && ollama pull llama3.2:3b && echo 'Modelo pronto!'"
    restart: "no"

volumes:
  l2core_pgdata:
  l2core_baileys_auth:
  l2core_ollama:
