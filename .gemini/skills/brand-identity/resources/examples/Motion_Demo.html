<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>L2 Motion Demo</title>
    <style>
        /* Import L2 Motion System */
        :root {
            --ease-l2-heavy: cubic-bezier(0.22, 1, 0.36, 1);
            --bg-void: #050505;
            --color-violet: #7F00FF;
            --color-white: #E0E0E0;
        }

        body {
            background-color: var(--bg-void);
            color: var(--color-white);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: #1A1A1A;
            width: 300px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            /* The L2 Transition */
            transition: transform 0.4s var(--ease-l2-heavy), 
                        box-shadow 0.4s var(--ease-l2-heavy),
                        border-color 0.4s var(--ease-l2-heavy);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px -10px rgba(127, 0, 255, 0.4);
            border-color: var(--color-violet);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 1rem 0;
        }

        p {
            color: #888;
            line-height: 1.5;
        }

        .btn {
            margin-top: 1.5rem;
            background: var(--color-violet);
            color: white;
            border: none;
            padding: 10px 20px;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            font-weight: bold;
            /* L2 Button Transition */
            transition: all 0.2s var(--ease-l2-heavy);
        }

        .btn:hover {
            background: #9D4DFF;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(127, 0, 255, 0.5);
        }
        
        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>L2 System</h1>
        <p>Hover over this card to feel the "Heavy Mass" physics engine. Note the lack of bounce and the decisive snap.</p>
        <button class="btn">Initiate</button>
    </div>

</body>
</html>
