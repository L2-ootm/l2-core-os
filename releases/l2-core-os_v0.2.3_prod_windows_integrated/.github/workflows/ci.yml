name: ci

on:
  push:
  pull_request:

jobs:
  api-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
      - name: Python syntax check
        run: |
          python -m py_compile apps/api/main.py apps/api/worker.py apps/api/core/config.py apps/api/core/ai_fallback.py

  node-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Node syntax checks
        run: |
          node --check apps/baileys-gateway/server.js
          node --check apps/web/server.js
